<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troca de Senha — FakeLetterboxd</title>
    <script src="../javascript/constantes.js"></script>
    <script src="../javascript/accounts/common.js"></script>
    <script src="../javascript/accounts/passwordChange.js"></script>
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body>
    <iframe src="../cabecalho.html" frameborder="0" width="100%" height="60" id="cabecalho" scrolling="no"></iframe>

    <div class="form-wrapper">
        <div class="form-card">
            <h1>Troca de Senha</h1>
            <form id="formulario">
                <div class="campo">
                    <label for="old_password">Senha atual</label>
                    <div class="password-container">
                        <input type="password" id="old_password" name="old_password"
                               autocomplete="current-password" autofocus required>
                        <img src="../img/eye-off.svg" alt="Mostrar senha" class="toggle-password">
                    </div>
                </div>
                <div class="campo">
                    <label for="new_password">Nova senha</label>
                    <div class="password-container">
                        <input type="password" id="new_password" name="new_password"
                               autocomplete="new-password" required>
                        <img src="../img/eye-off.svg" alt="Mostrar senha" class="toggle-password">
                    </div>
                    <span class="helptext">
                        Mínimo 8 caracteres. Não pode ser muito parecida com seus dados pessoais nem inteiramente numérica.
                    </span>
                </div>
                <div class="campo">
                    <label for="confirm_password">Confirmar nova senha</label>
                    <div class="password-container">
                        <input type="password" id="confirm_password" name="confirm_password"
                               autocomplete="new-password" required>
                        <img src="../img/eye-off.svg" alt="Mostrar senha" class="toggle-password">
                    </div>
                </div>
                <button type="submit" class="btn-submit">Trocar Senha</button>
            </form>
            <div id="message" class="msg"></div>
            <div class="form-footer">
                <p><a href="../perfil.html">Voltar ao perfil</a></p>
            </div>
        </div>
    </div>
</body>
</html>
