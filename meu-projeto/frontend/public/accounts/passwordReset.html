<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha — FakeLetterboxd</title>
    <script src="../javascript/constantes.js"></script>
    <script src="../javascript/accounts/passwordReset.js"></script>
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body>
    <iframe src="../cabecalho.html" frameborder="0" width="100%" height="60" id="cabecalho" scrolling="no"></iframe>

    <div class="form-wrapper">
        <div class="form-card">
            <h1>Recuperação de senha</h1>
            <form id="formulario">
                <div class="campo">
                    <label for="email">E-mail cadastrado</label>
                    <input type="email" id="email" name="email" autocomplete="email"
                           placeholder="seu@email.com" autofocus required>
                </div>
                <button type="submit" class="btn-submit">Enviar email de recuperação</button>
            </form>
            <div id="message" class="msg"></div>
            <div class="form-footer">
                <p><a href="login.html">Voltar ao login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
