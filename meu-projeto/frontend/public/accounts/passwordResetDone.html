<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha — FakeLetterboxd</title>
    <script src="../javascript/constantes.js"></script>
    <script src="../javascript/accounts/passwordResetDone.js"></script>
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body>
    <iframe src="../cabecalho.html" frameborder="0" width="100%" height="60" id="cabecalho" scrolling="no"></iframe>

    <div class="form-wrapper">
        <div class="form-card">
            <h1>Recuperação de senha</h1>
            <p class="instrucao">
                Verifique sua caixa de entrada e cole abaixo o código recebido por e-mail.
            </p>
            <div class="campo">
                <label for="token">Código de recuperação</label>
                <input type="text" id="token" name="token" autofocus required>
            </div>
            <div class="campo">
                <label for="novaSenha">Nova senha</label>
                <div class="password-container">
                    <input type="password" id="novaSenha" name="novaSenha"
                           autocomplete="new-password" placeholder="Senha" required>
                    <img src="../img/eye-off.svg" alt="Mostrar senha"
                         class="toggle-password" id="eyeIconNovaSenha">
                </div>
            </div>
            <div class="campo">
                <label for="confirmarSenha">Confirmar nova senha</label>
                <div class="password-container">
                    <input type="password" id="confirmarSenha" name="confirmarSenha"
                           autocomplete="new-password" placeholder="Confirmar senha" required>
                    <img src="../img/eye-off.svg" alt="Mostrar senha"
                         class="toggle-password" id="eyeIconConfirmarSenha">
                </div>
            </div>
            <button class="btn-submit" id="enviaNovaSenha" type="button">Enviar nova senha</button>
            <div id="message" class="msg"></div>
            <div class="form-footer">
                <p><a href="login.html">Voltar ao login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
