<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — FakeLetterboxd</title>
    <script src="../javascript/constantes.js"></script>
    <script src="../javascript/accounts/common.js"></script>
    <script src="../javascript/accounts/login.js"></script>
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body>
    <iframe src="../cabecalho.html" frameborder="0" width="100%" height="60" id="cabecalho" scrolling="no"></iframe>

    <div class="form-wrapper">
        <div class="form-card">
            <h1>Entrar</h1>
            <form id="loginForm">
                <div class="campo">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" autocomplete="username" autofocus required>
                </div>
                <div class="campo">
                    <label for="password">Senha</label>
                    <div class="password-container">
                        <input type="password" id="password" name="password" autocomplete="current-password" required>
                        <img src="../img/eye-off.svg" alt="Mostrar senha" class="toggle-password">
                    </div>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
            <div id="msg" class="msg"></div>
            <div class="form-footer">
                <p><a href="passwordReset.html">Esqueci minha senha</a></p>
                <p>Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
            </div>
        </div>
    </div>
</body>
</html>
