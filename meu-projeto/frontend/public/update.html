<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Avaliação</title>
    <script src="javascript/constantes.js"></script>
    <script src="javascript/accounts/common.js"></script>
    <script src="javascript/update.js"></script>
</head>
<body>
    <iframe src="cabecalho.html" frameborder="0" width="100%" height="50" id="cabecalho"></iframe>
    <h1>Atualizando Avaliação #<span id='idAvaliacao'></span></h1>
    <!-- Mídia associada — somente leitura -->
    <p><strong>Mídia:</strong> <span id="infoMidia"></span></p>
    <form id="meuFormulario">
        <table>
            <tbody>
                <tr><td align="right">Nota (1 a 5):</td><td>
                    <select name="nota" id="nota">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </td></tr>
                <tr><td align="right">Comentário:</td><td><textarea name="comentario" id="comentario"></textarea></td></tr>
                <tr><td align="right">Assistido em:</td><td><input type="date" name="assistido_em" id="assistido_em"></td></tr>
            </tbody>
        </table>
        <button id="atualiza">Atualizar Avaliação</button>
    </form>
    <div id="mensagem"></div>
</body>
</html>
