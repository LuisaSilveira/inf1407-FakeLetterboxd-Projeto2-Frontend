<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserir Avaliação</title>
    <script src="javascript/constantes.js"></script>
    <script src="javascript/accounts/common.js"></script>
    <script src="javascript/insereReview.js"></script>
</head>
<body>
    <iframe src="cabecalho.html" frameborder="0" width="100%" height="50"></iframe>
    <h1>Inserir Avaliação</h1>

    <!-- Busca de mídia via OMDB -->
    <fieldset>
        <legend>Buscar Mídia (OMDB)</legend>
        <label for="queryOmdb">Título da mídia:</label>
        <input type="text" id="queryOmdb" placeholder="Ex: The Matrix">
        <button id="buscaOmdb">Buscar</button>
        <div id="resultadoBusca"></div>
    </fieldset>

    <!-- Formulário da avaliação -->
    <form id="meuFormulario">
        <!-- imdb_id preenchido automaticamente pela busca OMDB -->
        <input type="hidden" name="imdb_id" id="imdb_id">
        <table>
            <tbody>
                <tr><td align="right">Nota (1 a 5):</td><td>
                    <select name="nota" id="nota">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </td></tr>
                <tr><td align="right">Comentário:</td><td><textarea name="comentario" id="comentario"></textarea></td></tr>
                <tr><td align="right">Assistido em:</td><td><input type="date" name="assistido_em" id="assistido_em"></td></tr>
            </tbody>
        </table>
        <button id="insere">Inserir Avaliação</button>
    </form>
    <div id="mensagem"></div>
</body>
</html>
