<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Avaliação — FakeLetterboxd</title>
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/formsAvaliacao.css">
    <script src="javascript/constantes.js"></script>
    <script src="javascript/accounts/common.js"></script>
    <script src="javascript/insereReview.js"></script>
</head>
<body>
    <iframe src="cabecalho.html" frameborder="0" width="100%" height="60" id="cabecalho" scrolling="no"></iframe>

    <div class="container">
        <h1>Nova Avaliação</h1>

        <!-- Busca OMDB -->
        <div class="secao" id="secao-busca">
            <h2>Buscar Filme ou Série</h2>
            <div class="busca-form">
                <input type="text" id="queryOmdb" class="busca-input" placeholder="Digite o título...">
                <button class="btn btn-primary" id="buscaOmdb">Buscar</button>
            </div>
            <div id="listaResultados"></div>
        </div>

        <!-- Mídia selecionada -->
        <div class="secao oculto" id="secao-selecionada">
            <h2><span class="check-icon">✓</span> Mídia Selecionada</h2>
            <div class="resultado-item midia-selecionada" id="midia-selecionada-info">
                <img class="poster" id="poster-selecionado" src="" alt="">
                <div class="info-midia">
                    <div class="titulo-midia" id="titulo-selecionado"></div>
                    <div class="detalhes-midia" id="detalhes-selecionado"></div>
                    <div class="sinopse" id="sinopse-selecionada"></div>
                </div>
                <div class="actions">
                    <button class="btn btn-danger" id="trocar-midia">Trocar</button>
                </div>
            </div>
        </div>

        <!-- Formulário de avaliação -->
        <div class="secao oculto" id="secao-form">
            <h2>Sua Avaliação</h2>
            <form id="meuFormulario" class="form-avaliacao">
                <input type="hidden" id="midia_id">

                <div class="linha-dupla">
                    <div class="campo">
                        <label for="nota">Nota</label>
                        <select id="nota" name="nota">
                            <option value="1">1 — Péssimo</option>
                            <option value="2">2 — Ruim</option>
                            <option value="3" selected>3 — Regular</option>
                            <option value="4">4 — Bom</option>
                            <option value="5">5 — Excelente</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label for="assistido_em">Assistido em</label>
                        <input type="date" id="assistido_em" name="assistido_em">
                    </div>
                </div>

                <div class="campo">
                    <label for="comentario">Comentário</label>
                    <textarea id="comentario" name="comentario" placeholder="O que você achou?"></textarea>
                </div>

                <button type="button" class="btn-publicar" id="insere">Publicar Avaliação</button>
            </form>
        </div>

        <div id="msg-feedback" class="msg-feedback oculto"></div>
    </div>
</body>
</html>
