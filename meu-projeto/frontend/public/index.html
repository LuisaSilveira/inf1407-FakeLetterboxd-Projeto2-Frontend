<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Avaliações — FakeLetterboxd</title>
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/listaAvaliacao.css">
    <script src="javascript/constantes.js"></script>
    <script src="javascript/accounts/common.js"></script>
    <script src="javascript/script.js"></script>
</head>
<body>
    <iframe src="cabecalho.html" frameborder="0" width="100%" height="60" id="cabecalho" scrolling="no"></iframe>

    <h1>Lista de Avaliações</h1>

    <div class="acoes-bar" id="acoes-logado">
        <a href="insereReview.html" class="btn btn-atualizar">+ Nova Avaliação</a>
    </div>

    <!-- Painel de filtros -->
    <section class="busca-container" id="filtros-panel" aria-label="Filtros de avaliações">
        <div class="busca-form">
            <!-- Busca por título -->
            <input
                type="text"
                id="filtro-titulo"
                name="busca_titulo"
                placeholder="Buscar por título..."
                class="busca-input"
                aria-label="Buscar por título"
            >

            <!-- Busca por usuário -->
            <input
                type="text"
                id="filtro-pessoa"
                name="busca_pessoa"
                placeholder="Buscar por usuário..."
                class="busca-input"
                aria-label="Buscar por usuário"
            >

            <!-- Filtro por tipo -->
            <select id="filtro-tipo" name="tipo_midia" class="filtro-select" aria-label="Filtrar por tipo">
                <option value="">Tipo: Todos</option>
                <option value="filme">Filmes</option>
                <option value="serie">Séries</option>
            </select>

            <!-- Filtro por gênero -->
            <select id="filtro-genero" name="genero_midia" class="filtro-select" aria-label="Filtrar por gênero">
                <option value="">Gênero: Todos</option>
                <option value="acao">Ação</option>
                <option value="comedia">Comédia</option>
                <option value="terror">Terror</option>
                <option value="romance">Romance</option>
                <option value="drama">Drama</option>
                <option value="ficcao">Ficção Científica</option>
                <option value="aventura">Aventura</option>
                <option value="suspense">Suspense</option>
                <option value="animacao">Animação</option>
                <option value="documentario">Documentário</option>
            </select>

            <!-- Ordenar por nota -->
            <select id="filtro-ordem" name="ordem_nota" class="filtro-select" aria-label="Ordenar por nota">
                <option value="">Ordenar por nota</option>
                <option value="maior">Maior Nota</option>
                <option value="menor">Menor Nota</option>
            </select>

            <button type="button" id="btn-filtrar" class="btn-buscar">Filtrar</button>
            <button type="button" id="btn-limpar" class="btn-limpar">Limpar</button>
        </div>

        <!-- Informações sobre filtros ativos -->
        <div id="busca-info" class="busca-info oculto"></div>
    </section>

    <div id="msg-feedback" class="mensagens oculto"></div>

    <!-- Grid de avaliações -->
    <div class="avaliacoes-grid" id="avaliacoes-grid">
        <div class="empty-state" id="carregando">
            <p>Carregando avaliações…</p>
        </div>
    </div>

    <!-- Modal de confirmação de exclusão -->
    <div id="modal-apagar" class="modal-overlay">
        <div class="modal-box">
            <p>Tem certeza que deseja excluir esta avaliação?</p>
            <div class="modal-actions">
                <button class="btn btn-confirmar" id="modal-confirmar">Excluir</button>
                <button class="btn btn-cancelar" id="modal-cancelar">Cancelar</button>
            </div>
        </div>
    </div>
</body>
</html>
